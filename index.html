<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Bulletins Étudiant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="page-login" class="page page-login active">
    <div class="login-wrapper">
      <div class="login-logo-area">
        <img src="ensias.png" alt="ENSIAS" class="ensias-logo-big" />
        <h1 class="login-title">Bulletins Étudiant</h1>
        <p class="login-subtitle">Université Mohammed V – ENSIAS</p>
      </div>
      <div class="login-card">
        <h2>Connexion</h2>
        <p class="login-hint">Entrez vos identifiants institutionnels</p>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-field">
            <label>Email institutionnel</label>
            <input type="email" id="login-email" placeholder="prenom.nom@ensias.um5.ac.ma" required />
          </div>
          <div class="form-field">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <div id="login-error" class="alert alert-error" style="display:none"></div>
          <button type="submit" class="btn-login">Se connecter</button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
